name: Tennis Court Monitor

on:
  schedule:
    - cron: '*/5 8-20 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache YOLO model
        uses: actions/cache@v4
        with:
          path: yolov8n.pt
          key: yolov8n-model

      - name: Download YOLO model
        run: |
          if [ ! -f yolov8n.pt ]; then
            wget -q https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.pt
          fi

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBCAM_URL: ${{ secrets.WEBCAM_URL }}
          GOTCOURTS_URL: ${{ secrets.GOTCOURTS_URL }}
          MODEL_PATH: yolov8n.pt
        run: python monitor.py